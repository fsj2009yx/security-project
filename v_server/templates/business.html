<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>业务应用</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">V服务器业务应用</h1>
        <div class="mt-4">
            <h2>客户端访问状态</h2>
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>客户端ID</th>
                        <th>最后访问时间</th>
                    </tr>
                </thead>
                <tbody>
                    {% for client_id, info in clients.items() %}
                    <tr>
                        <td>{{ client_id }}</td>
                        <td>{{ info.last_access | datetimeformat }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <div class="mt-4">
            <h2>业务功能</h2>
            <div class="card">
                <div class="card-body">
                    <p>这里是V服务器的业务应用功能展示区域。</p>
                    <p>客户端可以通过认证后访问此页面。</p>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
