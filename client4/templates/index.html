<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kerberos认证客户端</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">Kerberos认证客户端</h1>
        <div class="mt-4">
            <div class="card">
                <div class="card-body">
                    <h2>客户端信息</h2>
                    <p>客户端ID: client4</p>
                    <button id="authenticate-btn" class="btn btn-primary">发起认证</button>
                    <button id="verify-ticket-btn" class="btn btn-secondary ml-2">验证票据</button>
                    <a href="/business" class="btn btn-success ml-2">访问业务应用</a>
                </div>
            </div>
        </div>
        <div class="mt-4">
            <div class="card">
                <div class="card-body">
                    <h2>加密通信</h2>
                    <div class="form-group">
                        <label for="message">输入消息:</label>
                        <input type="text" id="message" class="form-control">
                    </div>
                    <button id="send-message-btn" class="btn btn-primary mt-2">发送消息</button>
                    <div id="message-result" class="mt-4"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#authenticate-btn').click(function() {
                $.ajax({
                    url: '/authenticate',
                    type: 'POST',
                    success: function(response) {
                        alert(response.message);
                    },
                    error: function() {
                        alert('认证失败');
                    }
                });
            });
            
            $('#verify-ticket-btn').click(function() {
                $.ajax({
                    url: '/verify_ticket',
                    type: 'POST',
                    success: function(response) {
                        alert(response.message);
                    },
                    error: function() {
                        alert('票据验证失败');
                    }
                });
            });
            
            $('#send-message-btn').click(function() {
                var message = $('#message').val();
                $.ajax({
                    url: '/send_message',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({message: message}),
                    success: function(response) {
                        $('#message-result').html(`
                            <div class="alert alert-info">
                                <p>明文: ${response.message}</p>
                                <p>密文: ${response.encrypted_message}</p>
                                <p>签名: ${response.signature}</p>
                            </div>
                        `);
                    },
                    error: function() {
                        alert('发送消息失败');
                    }
                });
            });
        });
    </script>
</body>
</html>
